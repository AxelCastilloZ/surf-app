server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip ─────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── SPA routing ──────────────────────────────────────────
    # Todas las rutas que no correspondan a archivos estáticos
    # regresan a index.html para que React Router las maneje.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache: assets con hash en el nombre ──────────────────
    # Vite genera nombres como: main-BsX3k1aP.js
    # 1 año de cache + immutable: el browser nunca los re-descarga
    location ~* \.(js|css|woff|woff2|ttf|eot|otf)$ {
        expires       1y;
        add_header    Cache-Control "public, immutable";
        access_log    off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires       1y;
        add_header    Cache-Control "public, immutable";
        access_log    off;
    }

    # ── Sin cache: index.html ─────────────────────────────────
    # Siempre se re-valida para que nuevos deploys se reflejen
    # de inmediato sin que el usuario tenga que limpiar caché.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── Seguridad básica ──────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "same-origin"     always;

    # Oculta la versión de Nginx en respuestas de error
    server_tokens off;
}
